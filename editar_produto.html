<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Produto</title>
    <link rel="stylesheet" href="style.css">
    <script>

        const baseUrl = 'http://localhost:3001'
        let produtos;
    
        function setProdutos(){
            fetch(`${baseUrl}/api/produto`)
            .then(response => response.json())
            .then(data => {
                produtos = data.values
                const selector = document.getElementById("produtos")
                produtos.forEach(element => {
                    let produto = document.createElement("option")
                    produto.value = element.id
                    produto.innerText = element.nome
                    selector.appendChild(produto)
                });
            })
        }
        setProdutos();
        


    </script>
</head>
<body>
    <div class="header">
        <h2>Editar Produto</h2>
    </div>
    <div class="container">
        <form id="editar-produto-form" class="form">
            <label for="nome">Produto:</label>

            <select id="produtos" name="produto" required>
                <option value="">Selecione o Produto: </option>
            </select>

            <label for="preco">Preço (R$):</label>
            <input type="number" id="preco" name="preco" min="0" step="0.01" value="10.00" required>
            <label for="descricao">Descrição:</label>
            <input type="text" id="descricao" name="descricao" value="Pamonha de milho fresco">
            <div class="buttons">
                <button type="submit">Atualizar</button>
                <a href="index.html" class="secondary-button">Cancelar</a>
            </div>
        </form>
        <div id="feedback"></div>
    </div>
    <div class="voltar">
        <a href="index.html">Voltar à Página Inicial</a>
    </div>

</body>
</html>

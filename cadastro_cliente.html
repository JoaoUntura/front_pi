<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Clientes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <h2>Cadastro de Clientes</h2>
    </div>
    <div class="container">
 
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" required>
            <label for="telefone">Telefone:</label>
            <input type="tel" id="telefone" name="telefone" required placeholder="(XX) XXXX-XXXX">
         
        
           <div class="buttons">
                <button onclick="sendCliente()">Salvar</button>
                <a href="login_usuario.html" class="secondary-button">Cancelar</a>
            </div>
    </div>
    <div class="voltar">
        <a href="index.html">Voltar à Página Inicial</a>
    </div>
    
    <script>

        const baseUrl = 'http://18.231.170.201:80'
        function sendCliente(){
            const nome = document.getElementById("nome").value
            const telefone = document.getElementById("telefone").value
            
            const data = {
                nome:nome,
                contato:telefone
            }

            let token = localStorage.getItem("token")
            fetch(`${baseUrl}/api/cliente`, {method:'POST', body:JSON.stringify(data),headers: {'Content-Type': 'application/json',"Authorization":`Bearer ${token}`}})
            .then(response => response.json())
            .then(data => {
                alert(data.message)
            })
        

        }

    </script>
</body>
</html>
